name: Build LaTeX document

on:
  push:
    branches: [ main, master ]
    paths:
      - '**.tex'
      - '**.bib'
      - 'figures/**'
      - 'preamble/**'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build_latex:
    runs-on: ubuntu-latest
    # 1. Run natively inside the official Debian-based TeX Live container
    container:
      image: texlive/texlive:latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # 2. Install Pygments (required by your minted package)
      - name: Install Pygments
        run: apt-get update && apt-get install -y python3-pygments
      
      # 3. Run latexmk directly instead of using a third-party action
      - name: Compile LaTeX document
        run: latexmk -lualatex -shell-escape main.tex
      
      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDF
          path: build/*.pdf
          
      # Keep your existing index.html and Deploy/Release steps exactly as they were below this!     
      - name: Copy index.html to build directory
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          BUILD_DATE=$(date +'%d. %m. %Y')
          sed "s/YYYY-MM-DD/${BUILD_DATE}/g" index.html > build/index.html
      
      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          destination_dir: .
          keep_files: false
          
      - name: Release PDF (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: build/*.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
